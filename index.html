<!DOCTYPE html>
<html style="overscroll-behavior: contain;"> <!-- Prevent swiping on mobile forcing a refresh of the page -->

<head>
	<title>Chess PGN Trainer</title>
	<meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-16">
	<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

	<!-- Needed external libraries -->

	<!-- CSS Scheme for application overall (everything except the chessboard itself) -->
	<link rel="stylesheet" href="./assets/pagestyle.css">

	<!-- W3 Responsive Web Design -->
	<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

	<!-- Support functions for the w3 template -->
	<script src="./assets/w3.js"></script>

	<!-- JQuery (required for chessboard.js) -->
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"
		integrity="sha384-NXgwF8Kv9SSAr+jemKKcbvQsz+teULH/a5UNJvZc6kP47hZgl62M1vGnw6gHQhb1"
		crossorigin="anonymous"></script>

	<!-- JQuery UI (needed for showing the pawn promotion dialog) -->
	<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css"
		integrity="sha384-vIQIPaHJRqkO8xhnLxSZ0rHF6LyiWXbLF3grsa9pv9yDFyOPGrE1teHOuRNMJoZs" crossorigin="anonymous">

	<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"
		integrity="sha384-EZJUCwX9EfOmrML5/1WejmhFx/azi54nnVfOndPu+VTQKOHabXXC9eS7VFdkLz0V"
		crossorigin="anonymous"></script>

	<!-- Chessboard.css -->
	<link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css"
		integrity="sha384-q94+BZtLrkL1/ohfjR8c6L+A6qzNH9R2hBLwyoAfu3i/WCvQjzL2RQJ3uNHDISdU" crossorigin="anonymous">

	<!-- Chessboard.js -->
	<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"
		integrity="sha384-8Vi8VHwn3vjQ9eUHUxex3JSN/NFqUg3QbPyX8kWyb93+8AC/pPWTzj+nHtbC5bxD"
		crossorigin="anonymous"></script>

	<!-- chess.js -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.2/chess.js"
		integrity="sha384-s3XgLpvmHyscVpijnseAmye819Ee3yaGa8NxstkJVyA6nuDFjt59u1QvuEl/mecz"
		crossorigin="anonymous"></script>

	<!-- PGN Parser library -->
	<script src="https://cdn.jsdelivr.net/npm/@mliebelt/pgn-parser"
		integrity="sha384-7iGTh2nf8NwqiRFpm+Ubqueq44r1co6Bz1VfhIorLB+ndjkkEOBWV2f8DMZEj7M0"
		crossorigin="anonymous"></script>

	<!-- Color Picker library -->
	<script type="text/javascript" src="./assets/jquery.wheelcolorpicker.js"></script>
	<link type="text/css" rel="stylesheet" href="./assets/wheelcolorpicker.css" />

</head>

<body onload='initalize();' onresize="resizeBoards(); ">
	<div class="w3-sidebar w3-bar-block w3-collapse w3-card w3-animate-right light-mode"
		style="width:275px;right: 0px; padding-left: 8px;" id="mySidebar">
		<button onclick="w3_close()" class="w3-bar-item w3-button w3-large w3-hide-large w3-hover-none"
			style="text-align: right; padding-bottom: 4px;">Close &times;</button>

		<div class="landscapemode">
			<h3>Chess PGN Trainer</h3>
		</div>
		<p>
			<!-- Modify this to open a default PGN file -->
			<button type="button" id="openPGN_button" class="w3-button w3-round-large w3-indigo w3-hover-blue">Open Default PGN File</button>
			<!-- Remove the file input element since it's no longer needed -->
			<button id="btn_reset" class="w3-button w3-round-large w3-indigo w3-hover-blue">Reset</button>
		</p>

		<!-- Settings and other options here -->
	</div>

	<div class="w3-main">
		<div class="w3-container w3-indigo portraitmode light-mode" id="title_header">
			<div>
				<h3><button class="w3-button w3-large w3-hide-large" onclick="w3_open()"
						style="float: right; padding-top: 4px;">&#9776;</button><span id='Title'>Chess PGN
						Trainer</span></h3>
			</div>
		</div>

		<!-- The main content with boards, progress, etc. -->
	</div>

	<!-- Custom code for this project (needs to be here AFTER elements are built & labelled) -->
	<script src="./assets/chess-pgn-trainer.js"></script>
	<script src="./assets/piece-list.js"></script>

	<!-- Add the script for handling the default PGN loading -->
	<script>
		// New function to load the default PGN file from the main branch
		function loadDefaultPGN() {
			const pgnFileUrl = 'https://raw.githubusercontent.com/yourusername/yourrepository/main/your-pgn-file.pgn';
			
			// Fetch the PGN file from the URL
			fetch(pgnFileUrl)
				.then(response => response.text())
				.then(pgn => {
					// Assuming loadPGN is a function in your project that processes PGN data
					loadPGN(pgn);
				})
				.catch(error => {
					console.error("Error loading PGN file:", error);
				});
		}

		// Attach the loadDefaultPGN function to the button click event
		document.getElementById('openPGN_button').addEventListener('click', loadDefaultPGN);
	</script>

</body>
</html>
